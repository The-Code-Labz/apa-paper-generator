services:
  apa-generator:
    build:
      context: .
      dockerfile: Dockerfile
    image: apa-generator:latest
    container_name: apa-generator
    restart: unless-stopped
    ports:
      - "8030:8000"
    env_file:
      - .env
    volumes:
      # Persist generated .docx files across container restarts
      - apa-papers:/tmp/apa-papers
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  apa-papers:
    name: apa-papers

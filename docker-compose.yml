services:

  # ── APA Paper Generator ───────────────────────────────────────────────────────
  apa-generator:
    image: ghcr.io/the-code-labz/apa-paper-generator:latest
    container_name: apa-generator
    restart: unless-stopped
    pull_policy: build          # always rebuild from local source on `compose up`
    ports:
      - "8030:8000"
    env_file:
      - .env
    volumes:
      # Persist generated .docx files across container restarts
      - apa-papers:/tmp/apa-papers
    networks:
      - apa-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      com.code-labz.service: "apa-paper-generator"
      com.code-labz.description: "APA 7th edition paper generator — FastAPI backend"


# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  apa-papers:
    name: apa-papers

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  apa-net:
    name: apa-net
    driver: bridge

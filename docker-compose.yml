services:

  # ── APA Paper Generator ───────────────────────────────────────────────────────
  apa-generator:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/the-code-labz/apa-paper-generator:latest
    container_name: apa-generator
    restart: unless-stopped
    pull_policy: build          # always rebuild from local source on `compose up`
    ports:
      - "8030:8000"
    env_file:
      - .env
    volumes:
      # Persist generated .docx files across container restarts
      - apa-papers:/tmp/apa-papers
    networks:
      - apa-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      com.code-labz.service: "apa-paper-generator"
      com.code-labz.description: "APA 7th edition paper generator — FastAPI backend"

  # ── Watchtower (auto-update) ──────────────────────────────────────────────────
  # Polls the registry every 5 minutes and restarts any service whose image has
  # been updated.  Only watches containers labelled with com.centurylinklabs.watchtower.enable=true.
  # To opt a service in, add that label under its `labels:` block above.
  # To disable auto-update entirely, comment out this whole service.
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_CLEANUP: "true"                # remove old images after update
      WATCHTOWER_POLL_INTERVAL: "300"           # check every 5 minutes
      WATCHTOWER_LABEL_ENABLE: "true"           # only watch labelled containers
      WATCHTOWER_NOTIFICATIONS_LEVEL: "info"
    networks:
      - apa-net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  apa-papers:
    name: apa-papers

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  apa-net:
    name: apa-net
    driver: bridge
